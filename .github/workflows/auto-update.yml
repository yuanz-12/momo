name: 自动下载词典 → 运行脚本 → 提交结果
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v5

      - name: 下载最新词典 ZIP
        run: |
          wget -O source.zip "https://github.com/amzxyz/rime_wanxiang/releases/download/dict-nightly/pro-moqi-fuzhu-dicts.zip"

      - name: 解压到 input_dicts
        run: |
          mkdir -p input_dicts
          unzip -o source.zip -d ./input_dicts

      - name: 设置 Python 环境
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 安装依赖（按需添加）
        run: |
          python -m pip install --upgrade pip
          pip install tqdm  # 关键：安装tqdm库，解决报错

      - name: 运行你的处理脚本
        run: |
          mkdir -p output_dicts
          python duofuzhu.py

      - name: 提交输出文件到仓库
        uses: EndBug/add-and-commit@v10
        with:
          message: "自动更新处理后词库 [ci skip]"
          add: "output_dicts/"
          pull: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
