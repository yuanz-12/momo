name: 自动下载词典 → 运行脚本 → 提交结果
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:  # 手动触发必须加这行

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 给写入权限，否则提交文件会失败！

    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 下载最新词典 ZIP
        run: |
          wget -O source.zip "https://github.com/amzxyz/rime_wanxiang/releases/download/dict-nightly/pro-moqi-fuzhu-dicts.zip"

      - name: 解压到 input_dicts
        run: |
          mkdir -p input_dicts
          unzip -o source.zip -d ./input_dicts

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'  # 缓存依赖，加速运行

      - name: 安装依赖（如果你的脚本需要第三方库，加在这里）
        run: |
          pip install --upgrade pip
          # 比如你的脚本需要 pandas，就加：pip install pandas

      - name: 运行你的处理脚本
        run: |
          mkdir -p output_dicts
          python duofuzhu.py  # 这里改成你真实的脚本文件名！

      - name: 提交输出文件到仓库
        uses: EndBug/add-and-commit@v9
        with:
          message: "自动更新处理后词库 [ci skip]"
          add: "output_dicts/"
          pull: true  # 解决冲突，避免提交失败
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
